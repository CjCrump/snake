<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Light Snake · Chance IT Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Saira+Stencil+One&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-screen="menu">

  <!-- ===== MENU · options + best ===== -->
  <section class="menu" aria-label="Menu">
    <div class="menu__card">
      <div class="brand">
        <div class="brand__eyebrow">Chance IT Studio</div>
        <div class="brand__name">LIGHT&nbsp;<span>SNAKE</span></div>
      </div>

      <p class="menu__hint" id="menuHint">Pilot the dragon, devour the orbs. Don't bite your tail or hit the wall.</p>

      <div class="menu__controls">
        <div class="field">
          <span class="field__label">Mode</span>
          <div class="segmented" role="radiogroup" aria-label="Mode">
            <input type="radio" name="mode" id="modeClassic" value="classic" checked />
            <label for="modeClassic">Classic</label>
            <input type="radio" name="mode" id="modeObstacles" value="obstacles" />
            <label for="modeObstacles">Obstacles</label>
          </div>
        </div>

        <div class="field">
          <span class="field__label">Speed</span>
          <div class="segmented segmented--3" role="radiogroup" aria-label="Speed">
            <input type="radio" name="speed" id="spdCruise" value="cruise" />
            <label for="spdCruise">Cruise</label>
            <input type="radio" name="speed" id="spdClassic" value="classic" checked />
            <label for="spdClassic">Classic</label>
            <input type="radio" name="speed" id="spdBlitz" value="blitz" />
            <label for="spdBlitz">Blitz</label>
          </div>
        </div>
      </div>

      <div class="records" aria-label="Best">
        <div class="record">
          <div class="record__label">Best · <span id="bestMode">Classic</span></div>
          <div class="record__value" id="bestValue"><span class="dim">no run yet</span></div>
        </div>
      </div>

      <div class="menu__actions">
        <button id="muteBtn" class="mute" type="button" aria-label="Toggle sound" title="Sound on/off">♪</button>
        <button id="startBtn" class="btn btn--primary" type="button">Start</button>
      </div>

      <div class="menu__foot">LIGHT SNAKE · WASD / arrows / D-pad · <a href="https://chanceitstudio.com" target="_blank" rel="noopener">chanceitstudio.com</a></div>
    </div>
  </section>

  <!-- ===== PLAY · minimal strip + field ===== -->
  <section class="play" aria-label="Play">
    <header class="strip">
      <div class="strip__title">LIGHT&nbsp;<span>SNAKE</span></div>
      <div class="strip__stats">
        <div class="stat"><span class="stat__k">Orbs</span><span class="stat__v" id="score">0</span></div>
        <div class="stat"><span class="stat__k">Best</span><span class="stat__v" id="best">0</span></div>
      </div>
    </header>

    <main class="stage" id="stage">
      <canvas id="game"></canvas>

      <!-- ghost cross D-pad — overlaid, mobile/touch only (CSS-gated) -->
      <div class="dpad" id="dpad" aria-label="Direction pad">
        <button class="pad pad--up"    data-dir="UP"    aria-label="Up">&#9650;</button>
        <button class="pad pad--left"  data-dir="LEFT"  aria-label="Left">&#9664;</button>
        <button class="pad pad--right" data-dir="RIGHT" aria-label="Right">&#9654;</button>
        <button class="pad pad--down"  data-dir="DOWN"  aria-label="Down">&#9660;</button>
      </div>

      <div id="overlay" class="overlay"></div>
    </main>
  </section>

  <script src="hub-bridge.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
