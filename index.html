<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Light Snake · Chance IT Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Saira+Stencil+One&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="hud">
      <div class="hud__brand">LIGHT <span>SNAKE</span></div>
      <div class="hud__stats">
        <div class="stat"><span class="stat__k">Orbs</span><span class="stat__v" id="score">0</span></div>
        <div class="stat"><span class="stat__k">Best</span><span class="stat__v" id="best">0</span></div>
      </div>
    </header>

    <div class="stage">
      <canvas id="game"></canvas>
      <div id="overlay" class="overlay"></div>
    </div>

    <div class="dpad" aria-label="Controls">
      <button class="arrow" data-dir="UP" aria-label="Up">&#9650;</button>
      <div class="dpad__row">
        <button class="arrow" data-dir="LEFT" aria-label="Left">&#9664;</button>
        <button class="arrow" data-dir="DOWN" aria-label="Down">&#9660;</button>
        <button class="arrow" data-dir="RIGHT" aria-label="Right">&#9654;</button>
      </div>
    </div>
  </div>

  <script src="hub-bridge.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
